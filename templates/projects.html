<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — tano.to</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="site-wrapper">
        <!-- Logo links back to homepage -->
        <a href="/">
            <img src="/static/assets/tanotologo.png" alt="tano.to" class="logo">
        </a>

        <div class="content-box">
            <nav class="main-nav">
                <a href="/projects">Projects</a>
                <a href="/media">Media</a>
                <a href="/blog">Blog</a>
                <a href="/dreams">Dreams</a>
                <a href="/misc">Misc.</a>
                <a href="/about">About</a>
            </nav>

            <div class="page-content">
                <!-- 3-column project grid -->
                <div class="project-grid">
                    {% for project in projects %}
                    <a class="project-card" href="{{ project.url }}">
                        <!-- Thumbnail: shows a placeholder div if no image is set -->
                        <div class="card-thumb">
                            <div class="card-fade"></div>
                            {% if project.thumbnail %}
                                <img src="/static/assets/{{ project.thumbnail }}" alt="{{ project.title }}">
                            {% else %}
                                <div class="card-thumb-placeholder"></div>
                            {% endif %}
                        </div>

                        <div class="card-body">
                            <div class="card-title">{{ project.title }}</div>
                            <div class="card-desc">{{ project.description }}</div>

                            <!-- Tags -->
                            <div class="card-tags">
                                {% for tag in project.tags %}
                                <span class="tag" data-tag="{{ tag }}">{{ tag }}</span>
                                {% endfor %}
                            </div>
                        </div>
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        /* Highlight the active nav link */
        const currentPath = window.location.pathname;
        document.querySelectorAll('.main-nav a').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
