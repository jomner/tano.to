<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tano.to</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/png" href="/static/assets/favicon.png">
</head>
<body>
    <div class="site-wrapper">
        <!-- Logo sits above the content box, links to homepage -->
        <a href="/">
            <img src="/static/assets/tanotologo.png" alt="tano.to" class="logo">
        </a>

        <!-- Main content box: nav at top, page content below -->
        <div class="content-box">
            <nav class="main-nav">
                <a href="/projects">Projects</a>
                <a href="/media">Media</a>
                <a href="/blog">Blog</a>
                <a href="/dreams">Dreams</a>
                <a href="/misc">Misc.</a>
                <a href="/about">About</a>
            </nav>

            <!-- Page content goes here -->
            <div class="page-content">
                <div class="bio">
                    <h2 class="bio-title">Hello! 你好! Hola! Bonjour! Hallo!<br>こんにちは! Привет! Olá! Ciao!<br>안녕하세요! !مرحبا สวัสดี! नमस्ते! Halo!<br>Γειά σου! Xin chào! Merhaba! Hei!</h2>
                    <p>Welcome to my website.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        /* Highlight the nav link matching the current page.
           Nothing gets highlighted on "/" (homepage). */
        const currentPath = window.location.pathname;
        document.querySelectorAll('.main-nav a').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>

</body>
</html>
